# Nginx config for LOCAL dev: 1 entry point (localhost:9000) → 3 PyClaw workers
#
# Usage:
#   nginx -c $(pwd)/deploy/nginx-dev.conf -p $(pwd)/deploy/
#   open http://localhost:9000
#
# 关键设计:
#   - upstream 用 ip_hash:
#       同一浏览器 (同 source IP) 总命中同一 worker
#       配合 PyClaw 的 affinity gateway 形成双层 stickiness:
#         Nginx ip_hash:  把请求路由到稳定的 worker
#         PyClaw affinity: 即使 Nginx 路由不同了, session 仍正确处理
#   - WebSocket /api/ws 单独配置 Upgrade headers
#   - SSE /v1/ 关闭 buffering 让流式输出实时
#   - access log 输出到 ./logs/ 方便观察哪个 worker 处理了请求

worker_processes 1;
error_log logs/nginx-error.log;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 自定义 log format: 显示 upstream worker (上游 PyClaw 进程是哪一个)
    log_format with_upstream '$remote_addr [$time_local] "$request" '
                             '$status -> upstream=$upstream_addr '
                             '($request_time s)';
    access_log logs/nginx-access.log with_upstream;

    upstream pyclaw_workers {
        # ip_hash 让同一客户端 IP 总命中同一 worker
        # 配合 PyClaw 的 affinity gateway 双重保险
        ip_hash;

        server 127.0.0.1:8000 max_fails=2 fail_timeout=10s;
        server 127.0.0.1:8001 max_fails=2 fail_timeout=10s;
        server 127.0.0.1:8002 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 9000;
        server_name localhost;

        # 加一个 X-Worker 响应头, 浏览器 DevTools 能看到当前请求落到哪个 worker
        add_header X-Upstream $upstream_addr always;

        # WebSocket: /api/ws
        location /api/ws {
            proxy_pass http://pyclaw_workers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # OpenAI-compat SSE: /v1/chat/completions 等
        location /v1/ {
            proxy_pass http://pyclaw_workers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;
            proxy_read_timeout 600s;
        }

        # 其他 API
        location /api/ {
            proxy_pass http://pyclaw_workers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # SPA + 静态资源
        location / {
            proxy_pass http://pyclaw_workers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
